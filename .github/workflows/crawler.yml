name: Daily IPTV Crawler

on:
  schedule:
    # 北京时间每天早上8点 (UTC+8 -> UTC 0点)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write      # 允许推送文件到仓库

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install cloudscraper beautifulsoup4

      - name: Run crawler
        run: python ZB.py
        env:
          TOTAL_PAGES: 1    # 修改此处数字可调整抓取页数

      - name: Commit and push results
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add iptvhote.txt iptvpmigu.txt
          git diff --staged --quiet || git commit -m "Update IPTV lists [skip ci]"
          git push
